<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCare — Add Inventory</title>
    <meta name="description" content="Add or edit inventory for a product.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="app-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">⚛︎</div>
                <div>
                    <h2>PharmaCare</h2>
                    <small>Management System</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="../index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a href="../orders/orders.html"><i class="bi bi-receipt-cutoff"></i> Orders</a>
                <div class="nav-section-title">Catalog</div>
                <a href="../products/products.html"><i class="bi bi-capsule"></i> Products</a>
                <a href="inventory.html" class="active"><i class="bi bi-boxes"></i> Inventory</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="btn-sidebar-toggle"><i class="bi bi-list"></i></button>
                <h1 class="page-title" id="formTitle">Add Inventory Item</h1>
                <div class="header-actions">
                    <a href="inventory.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-left"></i>
                        Back to Inventory</a>
                </div>
            </header>

            <div class="page-container">
                <div class="row justify-content-center">
                    <div class="col-lg-6">
                        <div class="card">
                            <div class="card-body">
                                <form id="inventoryForm" novalidate>
                                    <!-- Product -->
                                    <div class="mb-3">
                                        <label for="productId" class="form-label">Product <span
                                                class="text-danger">*</span></label>
                                        <select class="form-select" id="productId" required>
                                            <option value="" disabled selected>Select a product…</option>
                                        </select>
                                        <div class="invalid-feedback">Please select a product.</div>
                                    </div>

                                    <!-- Quantity On Hand -->
                                    <div class="mb-3">
                                        <label for="quantityOnHand" class="form-label">Quantity On Hand <span
                                                class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="quantityOnHand" min="0" value="0"
                                            required>
                                        <div class="invalid-feedback">Enter a valid quantity.</div>
                                    </div>

                                    <!-- Reorder Threshold -->
                                    <div class="mb-4">
                                        <label for="reorderThreshold" class="form-label">Reorder Threshold</label>
                                        <input type="number" class="form-control" id="reorderThreshold" min="0"
                                            value="10">
                                        <small class="text-muted">Low-stock alert triggers when quantity falls to or
                                            below this value.</small>
                                    </div>

                                    <!-- Submit -->
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                                            <i class="bi bi-plus-circle"></i> Add to Inventory
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/inventory.js"></script>
</body>

</html>
