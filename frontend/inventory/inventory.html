<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCare — Inventory</title>
    <meta name="description" content="Track and manage pharmacy inventory levels and low-stock alerts.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="app-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">⚛</div>
                <div>
                    <h2>PharmaCare</h2>
                    <small>Management System</small>
                </div>
            </div> 
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="../index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a href="../orders/orders.html"><i class="bi bi-receipt-cutoff"></i> Orders</a>
                <div class="nav-section-title">Catalog</div>
                <a href="../products/products.html"><i class="bi bi-capsule"></i> Products</a>
                <a href="inventory.html" class="active"><i class="bi bi-boxes"></i> Inventory</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="btn-sidebar-toggle"><i class="bi bi-list"></i></button>
                <h1 class="page-title">Inventory</h1>
                <div class="header-actions">
                    <a href="inventory-form.html" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Add
                        Inventory</a>
                </div>
            </header>

            <div class="page-container">
                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="search-input">
                        <i class="bi bi-search"></i>
                        <input type="text" class="form-control" id="searchInventory"
                            placeholder="Search by product name…" oninput="filterInventory()">
                    </div>
                    <select class="form-select" id="stockFilter" style="max-width:180px;" onchange="filterInventory()">
                        <option value="">All Stock Levels</option>
                        <option value="low">Low Stock Only</option>
                        <option value="ok">In Stock Only</option>
                    </select>
                </div>

                <!-- Inventory Table -->
                <div class="card">
                    <div class="card-body p-0">
                        <div id="inventorySpinner" class="spinner-overlay">
                            <div class="spinner-border" role="status"><span class="visually-hidden">Loading…</span>
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="table mb-0">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Product</th>
                                        <th>Qty On Hand</th>
                                        <th>Reorder Threshold</th>
                                        <th>Status</th>
                                        <th>Last Updated</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="inventoryTableBody"></tbody>
                            </table>
                        </div>
                        <div id="inventoryEmpty" class="empty-state" style="display:none;">
                            <i class="bi bi-boxes"></i>
                            <h5>No inventory records</h5>
                            <p>Click "Add Inventory" to add one.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Restock Modal -->
    <div class="modal fade" id="restockModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-plus-lg text-success me-2"></i>Restock Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p>Adding stock for: <strong id="restockProductName"></strong></p>
                    <div class="mb-3">
                        <label for="restockQty" class="form-label">Quantity to Add</label>
                        <input type="number" class="form-control" id="restockQty" min="1" placeholder="e.g. 50">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-primary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success" onclick="submitRestock()">
                        <i class="bi bi-check-circle"></i> Confirm Restock
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/inventory.js"></script>
</body>

</html>
