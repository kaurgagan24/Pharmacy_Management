<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCare — New Order</title>
    <meta name="description" content="Create or edit a patient order.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="app-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">⚛︎</div>
                <div>
                    <h2>PharmaCare</h2>
                    <small>Management System</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="../index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a href="orders.html" class="active"><i class="bi bi-receipt-cutoff"></i> Orders</a>
                <div class="nav-section-title">Catalog</div>
                <a href="../products/products.html"><i class="bi bi-capsule"></i> Products</a>
                <a href="../inventory/inventory.html"><i class="bi bi-boxes"></i> Inventory</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="btn-sidebar-toggle"><i class="bi bi-list"></i></button>
                <h1 class="page-title" id="formTitle">New Order</h1>
                <div class="header-actions">
                    <a href="orders.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-left"></i> Back
                        to Orders</a>
                </div>
            </header>

            <div class="page-container">
                <div class="row justify-content-center">
                    <div class="col-lg-7">
                        <div class="card">
                            <div class="card-body">
                                <form id="orderForm" novalidate>
                                    <!-- Patient Name -->
                                    <div class="mb-3">
                                        <label for="patientName" class="form-label">Patient Name <span
                                                class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="patientName"
                                            placeholder="e.g. Sarah Johnson" required minlength="2" maxlength="100">
                                        <div class="invalid-feedback">Enter a valid patient name (2–100 characters).
                                        </div>
                                    </div>

                                    <!-- Product -->
                                    <div class="mb-3">
                                        <label for="productId" class="form-label">Product <span
                                                class="text-danger">*</span></label>
                                        <select class="form-select" id="productId" required>
                                            <option value="" disabled selected>Select a product…</option>
                                        </select>
                                        <div class="invalid-feedback">Please select a product.</div>
                                    </div>

                                    <!-- Quantity -->
                                    <div class="mb-3">
                                        <label for="quantity" class="form-label">Quantity <span
                                                class="text-danger">*</span></label>
                                        <input type="number" class="form-control" id="quantity" min="1" value="1"
                                            required>
                                        <div class="invalid-feedback">Quantity must be at least 1.</div>
                                    </div>

                                    <!-- Total Amount (auto-calculated) -->
                                    <div class="mb-3">
                                        <label for="totalAmount" class="form-label">Total Amount ($)</label>
                                        <input type="number" class="form-control" id="totalAmount" step="0.01"
                                            min="0.01" required readonly style="background: var(--gray-50);">
                                        <small class="text-muted">Auto-calculated from product price × quantity.</small>
                                    </div>

                                    <!-- Status -->
                                    <div class="mb-4">
                                        <label for="status" class="form-label">Status</label>
                                        <select class="form-select" id="status">
                                            <option value="pending">Pending</option>
                                            <option value="fulfilled">Fulfilled</option>
                                            <option value="cancelled">Cancelled</option>
                                        </select>
                                    </div>

                                    <!-- Submit -->
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                                            <i class="bi bi-plus-circle"></i> Create Order
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/orders.js"></script>
</body>

</html>
