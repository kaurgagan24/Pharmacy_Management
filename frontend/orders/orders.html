<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCare — Orders</title>
    <meta name="description" content="Manage patient orders — view, create, edit, and delete pharmacy orders.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="app-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">⚛︎</div>
                <div>
                    <h2>PharmaCare</h2>
                    <small>Management System</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="../index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a href="orders.html" class="active"><i class="bi bi-receipt-cutoff"></i> Orders</a>
                <div class="nav-section-title">Catalog</div>
                <a href="../products/products.html"><i class="bi bi-capsule"></i> Products</a>
                <a href="../inventory/inventory.html"><i class="bi bi-boxes"></i> Inventory</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="btn-sidebar-toggle"><i class="bi bi-list"></i></button>
                <h1 class="page-title">Orders</h1>
                <div class="header-actions">
                    <a href="order-form.html" class="btn btn-primary"><i class="bi bi-plus-circle"></i> New Order</a>
                </div>
            </header>

            <div class="page-container">
                <!-- Filter Bar -->
                <div class="filter-bar">
                    <div class="search-input">
                        <i class="bi bi-search"></i>
                        <input type="text" class="form-control" id="searchOrders"
                            placeholder="Search by patient or order ID…" oninput="filterOrders()">
                    </div>
                    <select class="form-select" id="statusFilter" style="max-width:180px;" onchange="filterOrders()">
                        <option value="">All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="fulfilled">Fulfilled</option>
                        <option value="cancelled">Cancelled</option>
                    </select>
                </div>

                <!-- Orders Table -->
                <div class="card">
                    <div class="card-body p-0">
                        <div id="ordersSpinner" class="spinner-overlay">
                            <div class="spinner-border" role="status"><span class="visually-hidden">Loading…</span>
                            </div>
                        </div>
                        <div class="table-container">
                            <table class="table mb-0">
                                <thead>
                                    <tr>
                                        <th>Order ID</th>
                                        <th>Patient Name</th>
                                        <th>Product</th>
                                        <th>Qty</th>
                                        <th>Total</th>
                                        <th>Date</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="ordersTableBody"></tbody>
                            </table>
                        </div>
                        <div id="ordersEmpty" class="empty-state" style="display:none;">
                            <i class="bi bi-inbox"></i>
                            <h5>No orders found</h5>
                            <p>Click "New Order" to create one.</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/orders.js"></script>
</body>

</html>
