<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaCare — Add Product</title>
    <meta name="description" content="Add or edit a pharmaceutical product.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <div class="app-wrapper">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-icon">💊</div>
                <div>
                    <h2>PharmaCare</h2>
                    <small>Management System</small>
                </div>
            </div>
            <nav class="sidebar-nav">
                <div class="nav-section-title">Main</div>
                <a href="../index.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                <a href="../orders/orders.html"><i class="bi bi-receipt-cutoff"></i> Orders</a>
                <div class="nav-section-title">Catalog</div>
                <a href="products.html" class="active"><i class="bi bi-capsule"></i> Products</a>
                <a href="../inventory/inventory.html"><i class="bi bi-boxes"></i> Inventory</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <button class="btn-sidebar-toggle"><i class="bi bi-list"></i></button>
                <h1 class="page-title" id="formTitle">Add New Product</h1>
                <div class="header-actions">
                    <a href="products.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-left"></i> Back
                        to Products</a>
                </div>
            </header>

            <div class="page-container">
                <div class="row justify-content-center">
                    <div class="col-lg-7">
                        <div class="card">
                            <div class="card-body">
                                <form id="productForm" novalidate>
                                    <!-- Product Name -->
                                    <div class="mb-3">
                                        <label for="productName" class="form-label">Product Name <span
                                                class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="productName"
                                            placeholder="e.g. Paracetamol 500mg" required minlength="2" maxlength="150">
                                        <div class="invalid-feedback">Enter a product name (2–150 characters).</div>
                                    </div>

                                    <!-- Category -->
                                    <div class="mb-3">
                                        <label for="category" class="form-label">Category <span
                                                class="text-danger">*</span></label>
                                        <input type="text" class="form-control" id="category"
                                            placeholder="e.g. Analgesic, Antibiotic, PPE" required minlength="2"
                                            maxlength="100">
                                        <div class="invalid-feedback">Enter a category.</div>
                                    </div>

                                    <!-- Description -->
                                    <div class="mb-3">
                                        <label for="description" class="form-label">Description</label>
                                        <textarea class="form-control" id="description" rows="3"
                                            placeholder="Optional product description…"></textarea>
                                    </div>

                                    <!-- Price & Manufacturer -->
                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label for="unitPrice" class="form-label">Unit Price ($) <span
                                                    class="text-danger">*</span></label>
                                            <input type="number" class="form-control" id="unitPrice" step="0.01"
                                                min="0.01" required placeholder="0.00">
                                            <div class="invalid-feedback">Enter a valid price.</div>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label for="manufacturer" class="form-label">Manufacturer</label>
                                            <input type="text" class="form-control" id="manufacturer"
                                                placeholder="e.g. Generic Pharma" maxlength="150">
                                        </div>
                                    </div>

                                    <!-- Requires Prescription -->
                                    <div class="mb-4">
                                        <div class="form-check form-switch">
                                            <input class="form-check-input" type="checkbox" id="requiresPrescription">
                                            <label class="form-check-label" for="requiresPrescription">Requires
                                                Prescription (Rx)</label>
                                        </div>
                                    </div>

                                    <!-- Submit -->
                                    <div class="d-grid">
                                        <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
                                            <i class="bi bi-plus-circle"></i> Add Product
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/products.js"></script>
</body>

</html>
